services:
  app:
    build:
      context: ./src
      dockerfile: ../Dockerfile
    container_name: pic_bucket
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./src/php.ini:/usr/local/etc/php/conf.d/zz-custom.ini:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network

  queue:
    build:
      context: ./src
      dockerfile: ../Dockerfile
    container_name: pic_bucket_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    volumes:
      - ./src:/var/www/html
      - ./src/php.ini:/usr/local/etc/php/conf.d/zz-custom.ini:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - app
    networks:
      - app-network

  web:
    image: nginx:stable
    container_name: pic_bucket_nginx
    restart: unless-stopped
    ports:
      - "8007:80" # local port change
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
